<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
  <!-- SOJ Warmth Arc Badge — icon-only asset -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#893d79"/>
      <stop offset="100%" stop-color="#5d2550"/>
    </linearGradient>
  </defs>
  <circle cx="18" cy="18" r="18" fill="url(#bg)"/>
  <circle cx="18" cy="18" r="15.5" stroke="rgba(255,255,255,0.12)" stroke-width="0.8" fill="none"/>
  <!-- Liner walls: cupcake-liner sides (faint, reveal at larger sizes) -->
  <path d="M9 28 L8 23.5" stroke="rgba(255,255,255,0.14)" stroke-width="0.8" stroke-linecap="round" fill="none"/>
  <path d="M27 28 L28 23.5" stroke="rgba(255,255,255,0.14)" stroke-width="0.8" stroke-linecap="round" fill="none"/>
  <!-- Warmth arc: fuller bowl / community embrace / cupcake-liner base -->
  <path d="M9 28 Q18 36.5 27 28" stroke="rgba(255,255,255,0.28)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <!-- Three seed marks inside the liner bowl -->
  <circle cx="13.5" cy="25.5" r="1" fill="rgba(255,255,255,0.22)"/>
  <circle cx="18" cy="24.5" r="1" fill="rgba(255,255,255,0.22)"/>
  <circle cx="22.5" cy="25.5" r="1" fill="rgba(255,255,255,0.22)"/>
  <!-- SOJ monogram -->
  <text x="18" y="21" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="9.5" fill="white" letter-spacing="1.8">SOJ</text>
</svg>
