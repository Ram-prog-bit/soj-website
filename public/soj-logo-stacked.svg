<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 110" width="150" height="110">
  <!-- SOJ Stacked Logo — badge (r=30) centered, wordmark below, light background -->
  <defs>
    <linearGradient id="bg-s" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#893d79"/>
      <stop offset="100%" stop-color="#5d2550"/>
    </linearGradient>
  </defs>

  <!-- Badge: r=30 at (75,35), scaled 1.667× from the 36×36 master -->
  <circle cx="75" cy="35" r="30" fill="url(#bg-s)"/>
  <circle cx="75" cy="35" r="25.8" stroke="rgba(255,255,255,0.12)" stroke-width="1.3" fill="none"/>
  <!-- Liner walls -->
  <path d="M60 52 L58 44" stroke="rgba(255,255,255,0.14)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
  <path d="M90 52 L92 44" stroke="rgba(255,255,255,0.14)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
  <!-- Warmth arc (deeper bowl) -->
  <path d="M60 52 Q75 66 90 52" stroke="rgba(255,255,255,0.28)" stroke-width="2.3" stroke-linecap="round" fill="none"/>
  <!-- Three seed marks -->
  <circle cx="67.5" cy="47.5" r="1.65" fill="rgba(255,255,255,0.22)"/>
  <circle cx="75" cy="45.8" r="1.65" fill="rgba(255,255,255,0.22)"/>
  <circle cx="82.5" cy="47.5" r="1.65" fill="rgba(255,255,255,0.22)"/>
  <!-- SOJ monogram -->
  <text x="75" y="40" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="15.8" fill="white" letter-spacing="3">SOJ</text>

  <!-- Wordmark below -->
  <text x="75" y="81" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="9" fill="#753167" letter-spacing="3">SERVING OUR</text>
  <text x="75" y="101" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="19" fill="#192339">JUSTICE</text>
</svg>
