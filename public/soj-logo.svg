<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 44" width="220" height="44">
  <!-- SOJ Horizontal Logo — badge + wordmark, light background -->
  <defs>
    <linearGradient id="bg-h" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#893d79"/>
      <stop offset="100%" stop-color="#5d2550"/>
    </linearGradient>
  </defs>

  <!-- Badge: r=22 at (22,22) -->
  <circle cx="22" cy="22" r="22" fill="url(#bg-h)"/>
  <circle cx="22" cy="22" r="18.9" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none"/>
  <path d="M11 34 Q22 43 33 34" stroke="rgba(255,255,255,0.28)" stroke-width="1.7" stroke-linecap="round" fill="none"/>
  <circle cx="17.7" cy="30.5" r="1.2" fill="rgba(255,255,255,0.22)"/>
  <circle cx="22" cy="29.5" r="1.2" fill="rgba(255,255,255,0.22)"/>
  <circle cx="26.3" cy="30.5" r="1.2" fill="rgba(255,255,255,0.22)"/>
  <text x="22" y="26.5" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="11.5" fill="white" letter-spacing="2.2">SOJ</text>

  <!-- Wordmark -->
  <text x="55" y="19" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="9" fill="#753167" letter-spacing="2.8">SERVING OUR</text>
  <text x="54" y="38" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="19" fill="#192339">Justice</text>
</svg>
