<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 172 52" width="172" height="52" role="img" aria-label="Serving Our Justice">
  <title>Serving Our Justice</title>
  <defs>
    <linearGradient id="soj-nav-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#893d79"/>
      <stop offset="100%" stop-color="#5d2550"/>
    </linearGradient>
  </defs>

  <!-- Emblem: simplified bowl in a plum disc -->
  <g>
    <circle cx="26" cy="26" r="22" fill="url(#soj-nav-grad)"/>
    <circle cx="26" cy="26" r="18.8" fill="none" stroke="#d8b06a" stroke-opacity="0.5" stroke-width="1"/>

    <!-- Steam: three minimal cream wisps -->
    <path d="M21 14 q-2.4 3.5 0 7" fill="none" stroke="#f0e6d2" stroke-opacity="0.85" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M26 11.5 q-2.6 4 0 8.5" fill="none" stroke="#f0e6d2" stroke-opacity="0.9" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M31 14 q2.4 3.5 0 7" fill="none" stroke="#f0e6d2" stroke-opacity="0.85" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Bowl -->
    <ellipse cx="26" cy="28.5" rx="11" ry="2.6" fill="#f0e6d2"/>
    <path d="M15 28.5 Q26 41.5 37 28.5 Z" fill="#f0e6d2"/>
    <circle cx="26" cy="33" r="1.7" fill="#d8b06a"/>
  </g>

  <!-- Wordmark -->
  <text x="58" y="25" font-family="Inter, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="800" font-size="20" fill="#192339" letter-spacing="0.5">SOJ</text>
  <text x="59" y="41" font-family="Inter, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600" font-size="10.5" fill="#753167" letter-spacing="0.3">Serving Our Justice</text>
</svg>
